<svg xmlns="http://www.w3.org/2000/svg" width="4800" height="2900" viewBox="0 0 4800 2900">
<rect width="100%" height="100%" fill="white"/>
<style>text{font-family:Arial,Helvetica,sans-serif;letter-spacing:0}</style>
<defs>
<marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L16,8 L0,16 Z" fill="#5B739A"/></marker>
<marker id="arrow_orange" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L16,8 L0,16 Z" fill="#A5752A"/></marker>
<marker id="arrow_purple" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L16,8 L0,16 Z" fill="#5E4E86"/></marker>
<marker id="arrow_green" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L16,8 L0,16 Z" fill="#4D765D"/></marker>
</defs>
<text x="150" y="100" font-size="82" font-weight="800" fill="#202A36">Conceptual causal structure for antibiotic timing and 30-day mortality</text>
<text x="150" y="180" font-size="40" font-weight="400" fill="#53606E">Simplified directed acyclic graph illustrating measured confounding control, residual confounding, and the proposed clinical pathway.</text>
<line x1="150" y1="230" x2="4650" y2="230" stroke="#94A3B8" stroke-width="4"/>
<text x="225" y="505" font-size="48" font-weight="700" fill="#202A36">Measured confounding control</text>
<text x="225" y="1335" font-size="48" font-weight="700" fill="#202A36">Residual confounding</text>
<text x="1980" y="505" font-size="48" font-weight="700" fill="#202A36">Treatment strategy</text>
<text x="1980" y="1335" font-size="48" font-weight="700" fill="#202A36">Clinical pathway</text>
<text x="3630" y="925" font-size="48" font-weight="700" fill="#202A36">Outcome</text>
<rect x="220" y="560" width="1440" height="600" rx="28" fill="#F2F6FA" stroke="#5B739A" stroke-width="6"/><line x1="322" y1="828" x2="418" y2="828" stroke="#5B739A" stroke-width="8" stroke-linecap="round"/><circle cx="348" cy="828" r="15" fill="white" stroke="#5B739A" stroke-width="8"/><line x1="322" y1="860" x2="418" y2="860" stroke="#5B739A" stroke-width="8" stroke-linecap="round"/><circle cx="388" cy="860" r="15" fill="white" stroke="#5B739A" stroke-width="8"/><line x1="322" y1="892" x2="418" y2="892" stroke="#5B739A" stroke-width="8" stroke-linecap="round"/><circle cx="366" cy="892" r="15" fill="white" stroke="#5B739A" stroke-width="8"/><text x="500" y="680" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="500" dy="0">Measured baseline and time-</tspan><tspan x="500" dy="84">varying factors</tspan><tspan x="500" dy="84">(age, sex, race, admission</tspan><tspan x="500" dy="84">category, Charlson index,</tspan><tspan x="500" dy="84">SOFA, shock, lagged</tspan><tspan x="500" dy="84">severity)</tspan></text>
<rect x="220" y="1390" width="1440" height="600" rx="28" fill="#FBF7EF" stroke="#A5752A" stroke-width="6" stroke-dasharray="58 38"/><path d="M 370 1632 L 432 1744 L 308 1744 Z" fill="none" stroke="#A5752A" stroke-width="8" stroke-linejoin="round"/><line x1="370" y1="1670" x2="370" y2="1708" stroke="#A5752A" stroke-width="8" stroke-linecap="round"/><circle cx="370" cy="1730" r="6" fill="#A5752A"/><text x="500" y="1510" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="500" dy="0">Partially measured or</tspan><tspan x="500" dy="84">unmeasured clinical drivers</tspan><tspan x="500" dy="84">(diagnostic certainty,</tspan><tspan x="500" dy="84">lactate, source control,</tspan><tspan x="500" dy="84">antimicrobial</tspan><tspan x="500" dy="84">appropriateness, staffing)</tspan></text>
<rect x="1970" y="560" width="1320" height="600" rx="28" fill="#F4F2FA" stroke="#5E4E86" stroke-width="6"/><circle cx="2120" cy="860" r="48" fill="white" stroke="#5E4E86" stroke-width="8"/><line x1="2120" y1="860" x2="2120" y2="830" stroke="#5E4E86" stroke-width="8" stroke-linecap="round"/><line x1="2120" y1="860" x2="2150" y2="878" stroke="#5E4E86" stroke-width="8" stroke-linecap="round"/><text x="2250" y="764" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="2250" dy="0">Antibiotic</tspan><tspan x="2250" dy="84">initiation window</tspan><tspan x="2250" dy="84">after suspected-</tspan><tspan x="2250" dy="84">infection t0</tspan></text>
<rect x="1970" y="1390" width="1320" height="600" rx="28" fill="#F1F7F3" stroke="#4D765D" stroke-width="6"/><polyline points="2074,1720 2120,1668 2168,1714" fill="none" stroke="#4D765D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="2074" cy="1720" r="18" fill="white" stroke="#4D765D" stroke-width="8"/><circle cx="2120" cy="1668" r="18" fill="white" stroke="#4D765D" stroke-width="8"/><circle cx="2168" cy="1714" r="18" fill="white" stroke="#4D765D" stroke-width="8"/><text x="2250" y="1552" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="2250" dy="0">Duration of</tspan><tspan x="2250" dy="84">uncontrolled</tspan><tspan x="2250" dy="84">infection and early</tspan><tspan x="2250" dy="84">treatment-process</tspan><tspan x="2250" dy="84">organization</tspan></text>
<rect x="3620" y="980" width="1000" height="620" rx="28" fill="#FBF6ED" stroke="#A56F28" stroke-width="6"/><line x1="3712" y1="1344" x2="3828" y2="1344" stroke="#A56F28" stroke-width="8" stroke-linecap="round"/><rect x="3730" y="1322" width="18" height="22" fill="#A56F28"/><rect x="3764" y="1294" width="18" height="50" fill="#A56F28"/><rect x="3800" y="1264" width="18" height="80" fill="#A56F28"/><text x="3900" y="1278" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="3900" dy="0">30-day</tspan><tspan x="3900" dy="84">mortality</tspan></text>
<rect x="1380" y="2240" width="2440" height="305" rx="28" fill="#F7FAFC" stroke="#6B7A8C" stroke-width="6"/><path d="M 1530 2334 L 1580 2358 L 1572 2422 L 1530 2450 L 1488 2422 L 1480 2358 Z" fill="none" stroke="#6B7A8C" stroke-width="8" stroke-linejoin="round"/><polyline points="1506,2392 1526,2414 1560,2366" fill="none" stroke="#6B7A8C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="1660" y="2338" font-size="72" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1660" dy="0">CCW/IPCW aligns strategies at t0 and addresses</tspan><tspan x="1660" dy="84">informative artificial censoring, but cannot remove</tspan><tspan x="1660" dy="84">unmeasured confounding.</tspan></text>
<polyline points="1660,860 1970,860" fill="none" stroke="#5B739A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="1660,700 1840,420 4120,420 4120,980" fill="none" stroke="#5B739A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<polyline points="1660,1530 1810,1190 1970,1020" fill="none" stroke="#A5752A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="64 40" marker-end="url(#arrow_orange)"/>
<polyline points="1660,1800 1880,2110 4120,2110 4120,1600" fill="none" stroke="#A5752A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="64 40" marker-end="url(#arrow_orange)"/>
<polyline points="2630,1160 2630,1390" fill="none" stroke="#5E4E86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow_purple)"/>
<polyline points="3290,1690 3620,1290" fill="none" stroke="#4D765D" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow_green)"/>
<line x1="150" y1="2565" x2="4650" y2="2565" stroke="#D9E0E7" stroke-width="3"/>
<line x1="170" y1="2640" x2="330" y2="2640" stroke="#5B739A" stroke-width="9"/>
<text x="365" y="2610" font-size="42" fill="#53606E">measured confounding paths</text>
<line x1="1120" y1="2640" x2="1280" y2="2640" stroke="#A5752A" stroke-width="9" stroke-dasharray="64 40"/>
<text x="1315" y="2610" font-size="42" fill="#53606E">partially measured / unmeasured paths</text>
<line x1="2580" y1="2640" x2="2740" y2="2640" stroke="#5E4E86" stroke-width="10"/>
<line x1="2760" y1="2640" x2="2920" y2="2640" stroke="#4D765D" stroke-width="10"/>
<text x="2955" y="2610" font-size="42" fill="#53606E">proposed clinical pathway</text>
<text x="150" y="2808" font-size="42" fill="#53606E">Abbreviations: CCW, clone-censor-weight; IPCW, inverse probability of censoring weighting; SOFA, Sequential Organ Failure Assessment; t0, time zero.</text>
</svg>